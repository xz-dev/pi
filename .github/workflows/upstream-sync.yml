name: 'Upstream Sync'

on:
  schedule:
    - cron: '0 5,17 * * *'
    # scheduled at 13:00 and 01:00 Asia/Shanghai (UTC+8)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: upstream-sync-main
  cancel-in-progress: false

jobs:
  rebase-main-on-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Rebase main on upstream
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git remote add upstream https://github.com/earendil-works/pi.git
          git fetch upstream main
          git rebase upstream/main

      - name: Require sync workflow token
        env:
          PUSH_TOKEN: ${{ secrets.SYNC_WORKFLOW_TOKEN }}
        run: |
          test -n "${PUSH_TOKEN}" || {
            echo "::error::SYNC_WORKFLOW_TOKEN is required because GITHUB_TOKEN pushes do not trigger downstream workflows"
            exit 1
          }

      - name: Push rebased main
        env:
          PUSH_TOKEN: ${{ secrets.SYNC_WORKFLOW_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force-with-lease origin HEAD:main
